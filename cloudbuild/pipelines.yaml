steps:
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['auth', 'configure-docker', '${_CONT_REGISTRY_NAME}']

- name: 'gcr.io/cloud-builders/docker'
  args: [
    'build', 
    '-t',
    '${_CONT_REGISTRY_NAME}/${_PROJECT_ID}/${_CONT_REPOSITORY_NAME}/${_CONT_IMAGE_NAME}:latest',
    '--cache-from',
    '${_CONT_REGISTRY_NAME}/${_PROJECT_ID}/${_CONT_REPOSITORY_NAME}/${_CONT_IMAGE_NAME}:latest',
    'pipelines/.'
  ]

- name: 'gcr.io/cloud-builders/docker'
  args: ['push', '${_CONT_REGISTRY_NAME}/${_PROJECT_ID}/${_CONT_REPOSITORY_NAME}/${_CONT_IMAGE_NAME}:latest']


- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      echo "=== Configurando Job 1: Pipeline Principal ==="
      
      # Crear o actualizar job
      if gcloud run jobs describe ${_JOB1_NAME} --region=${_REGION} --project=${_PROJECT_ID} 2>/dev/null; then
        echo "Actualizando job existente: ${_JOB1_NAME}"
        gcloud run jobs update ${_JOB1_NAME} \
          --image=${_CONT_REGISTRY_NAME}/${_PROJECT_ID}/${_CONT_REPOSITORY_NAME}/${_CONT_IMAGE_NAME}:latest \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --memory=${_JOB_MEMORY} \
          --cpu=${_JOB_CPU} \
          --max-retries=${_MAX_RETRIES} \
          --task-timeout=${_TASK_TIMEOUT} \
          --command="kedro" \
          --args="run,--pipeline=${_JOB1_PIPELINE_NAME},--params=${_JOB1_PARAMS},--env=dev" \
          --set-env-vars="GOOGLE_APPLICATION_CREDENTIALS=gcp-sa-key.json,KEDRO_ENV=dev,PROJECT_ID=${_PROJECT_ID}"
      else
        echo "Creando nuevo job: ${_JOB1_NAME}"
        gcloud run jobs create ${_JOB1_NAME} \
          --image=${_CONT_REGISTRY_NAME}/${_PROJECT_ID}/${_CONT_REPOSITORY_NAME}/${_CONT_IMAGE_NAME}:latest \
          --region=${_REGION} \
          --project=${_PROJECT_ID} \
          --memory=${_JOB_MEMORY} \
          --cpu=${_JOB_CPU} \
          --max-retries=${_MAX_RETRIES} \
          --task-timeout=${_TASK_TIMEOUT} \
          --command="kedro" \
          --args="run,--pipeline=${_JOB1_PIPELINE_NAME},--params=${_JOB1_PARAMS},--env=dev" \
          --set-env-vars="GOOGLE_APPLICATION_CREDENTIALS=gcp-sa-key.json,KEDRO_ENV=dev,PROJECT_ID=${_PROJECT_ID}"
      fi
      
      # Configurar scheduler para Job 1
      if gcloud scheduler jobs describe ${_JOB1_NAME}-trigger --location=${_REGION} 2>/dev/null; then
        gcloud scheduler jobs update http ${_JOB1_NAME}-trigger \
          --location=${_REGION} \
          --schedule="${_JOB1_CRON}" \
          --uri="https://${_REGION}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${_PROJECT_ID}/jobs/${_JOB1_NAME}:run" \
          --http-method=POST \
          --oauth-service-account-email=${_SA_NAME}
      else
        gcloud scheduler jobs create http ${_JOB1_NAME}-trigger \
          --location=${_REGION} \
          --schedule="${_JOB1_CRON}" \
          --uri="https://${_REGION}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${_PROJECT_ID}/jobs/${_JOB1_NAME}:run" \
          --http-method=POST \
          --oauth-service-account-email=${_SA_NAME}
      fi

