images: ['${_CONT_REGISTRY_NAME}/${_PROJECT_ID}/${_CONT_REPOSITORY_NAME}/${_CONT_IMAGE_NAME}:latest']
options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: us-east4
  _JOB_MEMORY: 512Mi
  _JOB_CPU: "1"
  _MAX_RETRIES: "0"
  _TASK_TIMEOUT: 600s