    '--region', '${_REGION}',
    '--project', '${_PROJECT_ID}',
    '--memory', '${_JOB_MEMORY}',
    '--cpu', '${_JOB_CPU}',
    '--max-retries', '${_MAX_RETRIES}',
    '--task-timeout', '${_TASK_TIMEOUT}',
    '--set-env-vars', 'DAG_ENV=${_DAG_ENV},PROJECT_ID=${_PROJECT_ID}'
  ]

